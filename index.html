<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NordVault Brand Engine</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <h1>NordVault Employer Brand Engine</h1>

  <div class="top-section">

    <!-- LEFT PANEL -->
    <div class="left-panel">

      <h3 class="subtitle">Employer Brand Strength Index</h3>
      <canvas id="gaugeChart"></canvas>

      <p class="desc">
        Composite score driven by Awareness, Engagement & Conversion
      </p>

      <div class="metrics">
        <div class="card">
          <p id="brandIndex">50%</p>
          <span>Brand Index</span>
        </div>
      </div>

    </div>

  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <div class="control">
      <label>Branding Campaigns <span id="brandingVal">50</span></label>
      <input type="range" min="0" max="100" value="50" id="branding">
    </div>

    <div class="control">
      <label>Campus Presence <span id="campusVal">50</span></label>
      <input type="range" min="0" max="100" value="50" id="campus">
    </div>

    <div class="control">
      <label>VIP Events & PR <span id="vipVal">50</span></label>
      <input type="range" min="0" max="100" value="50" id="vip">
    </div>

    <div class="control">
      <label>Digital Engagement <span id="engagementVal">50</span></label>
      <input type="range" min="0" max="100" value="50" id="engagement">
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
